# Production overlay: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
services:
  postgres:
    ports: []

  redis:
    ports: []

  api:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    volumes:
      - image_data:/app/data/images

  worker:
    volumes:
      - image_data:/app/data/images

  frontend:
    environment:
      VITE_API_URL: ""
      VITE_PROXY_TARGET: http://api:8000
    volumes: []
