# CheckImg — single entrypoint on :80 (docker internal upstreams)
# UI:  http://checkimg.play2go.cloud/
# API: http://checkimg.play2go.cloud/api/
# Set VITE_API_URL= (empty) in docker-compose.prod.yml

server {
    listen 80;
    server_name _;

    client_max_body_size 20m;

    # ponytail: Docker embedded DNS — re-resolve after container recreate
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    location = /health {
        set $api http://api:8000;
        proxy_pass $api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /api/ {
        set $api http://api:8000;
        proxy_pass $api/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    location / {
        set $ui http://frontend:5173;
        proxy_pass $ui;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
