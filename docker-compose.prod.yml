# Production: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
services:
  postgres:
    ports: !reset []

  redis:
    ports: !reset []

  api:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports: !reset []
    volumes:
      - image_data:/app/data/images

  worker:
    volumes:
      - image_data:/app/data/images

  frontend:
    ports: !reset []
    environment:
      VITE_API_URL: ""
      VITE_PROXY_TARGET: http://api:8000
    volumes: []

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx-docker.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - frontend
    restart: unless-stopped
